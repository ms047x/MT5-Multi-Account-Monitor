<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="10">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gin MT5多账户盈亏监控台</title>
<style>
:root{--bg:#0d1117;--card-bg:#161b22;--card-border:#30363d;--text:#e6edf3;--text-dim:#8b949e;--text-muted:#6e7681;--green:#3fb950;--green-bg:rgba(63,185,80,0.1);--red:#f85149;--red-bg:rgba(248,81,73,0.1);--yellow:#d29922;--radius:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica Neue,Arial,Noto Sans SC,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:20px}
.container{max-width:1400px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.header h1{font-size:22px;font-weight:600}
.time{font-size:13px;color:var(--text-dim)}
.summary-bar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px}
.summary-item{flex:1;min-width:130px;background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius);padding:12px 16px}
.summary-item .label{font-size:11px;color:var(--text-dim);margin-bottom:4px}
.summary-item .value{font-size:20px;font-weight:700}
.summary-item .value.profit{color:var(--green)}
.summary-item .value.loss{color:var(--red)}
.summary-item .value.neutral{color:var(--text)}
.chart-section{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius);padding:16px;margin-bottom:24px}
.chart-section .chart-title{font-size:14px;font-weight:600;color:var(--text-dim);margin-bottom:12px}
.chart-section svg{width:100%;height:180px;display:block}
.chart-section .sparkline{fill:none;stroke:var(--green);stroke-width:2;stroke-linejoin:round;stroke-linecap:round}
.chart-section .sparkfill{fill:var(--green);fill-opacity:0.1}
.chart-section .grid-line{stroke:var(--card-border);stroke-width:0.5;stroke-dasharray:4,4}
.chart-section text{font-size:10px;fill:var(--text-muted)}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius);padding:16px 18px}
.card:hover{border-color:#484f5a}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-name{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.card-server{font-size:11px;color:var(--text-muted);background:rgba(110,118,129,0.15);padding:2px 8px;border-radius:4px}
.led{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.led.online{background:var(--green);box-shadow:0 0 6px var(--green)}
.led.offline{background:var(--red);box-shadow:0 0 6px var(--red)}
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 12px}
.metric-label{font-size:11px;color:var(--text-dim)}
.metric-value{font-size:16px;font-weight:600}
.metric-value.profit{color:var(--green)}
.metric-value.loss{color:var(--red)}
.metric-value.neutral{color:var(--text)}
.profit-bar{margin-top:10px;height:3px;border-radius:2px;background:var(--card-border);overflow:hidden}
.profit-bar .fill{height:100%;transition:width .5s;border-radius:2px}
.profit-bar .fill.positive{background:var(--green)}
.profit-bar .fill.negative{background:var(--red)}
.profit-bar .fill.neutral{background:var(--text-muted)}
.cent-badge{font-size:10px;color:var(--yellow);background:rgba(210,153,34,0.12);padding:1px 6px;border-radius:4px;margin-left:4px;font-weight:400}
.card-error{margin-top:8px;padding:6px 10px;border-radius:6px;background:var(--red-bg);font-size:12px;color:var(--red)}
.footer{margin-top:32px;padding-top:16px;border-top:1px solid var(--card-border);display:flex;justify-content:space-between;font-size:12px;color:var(--text-muted)}
@media(max-width:640px){body{padding:12px}.cards{grid-template-columns:1fr}}
.layout{display:flex;min-height:100vh}
.sidebar{width:200px;background:var(--card-bg);border-right:1px solid var(--card-border);padding:20px 0;flex-shrink:0}
.sidebar-header{padding:0 16px 16px;border-bottom:1px solid var(--card-border);margin-bottom:8px;font-size:15px;font-weight:600}
.sidebar-nav{display:flex;flex-direction:column;gap:2px}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 16px;color:var(--text-dim);text-decoration:none;font-size:13px}
.nav-item:hover{background:rgba(255,255,255,0.05);color:var(--text)}
.nav-item.active{background:var(--bg);color:var(--accent);border-right:3px solid var(--accent)}
.main-content{flex:1;overflow:auto}
.acct-sel{display:inline-flex;align-items:center;gap:8px}.acct-sel select{background:var(--card-bg);color:var(--text);border:1px solid var(--card-border);padding:4px 8px;border-radius:4px;font-size:13px}.acct-sel button{background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent);padding:4px 12px;border-radius:4px;cursor:pointer;font-size:13px}.acct-info{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius);padding:16px;margin-bottom:20px}.acct-info-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}.acct-name{font-size:18px;font-weight:600}.acct-server{font-size:12px;color:var(--text-muted);background:rgba(110,118,129,0.15);padding:2px 8px;border-radius:4px}.status-on{color:var(--green);font-size:12px;font-weight:500}.status-off{color:var(--red);font-size:12px;font-weight:500}.acct-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.si{padding:8px;background:var(--bg);border-radius:4px}.sl{font-size:11px;color:var(--text-dim);margin-bottom:2px}.sv{font-size:18px;font-weight:600}.sv.profit{color:var(--green)}.sv.loss{color:var(--red)}.acct-nav{display:inline-flex;flex-wrap:wrap;gap:4px;align-items:center}.acct-link{color:var(--text-dim);text-decoration:none;font-size:12px;padding:3px 8px;border-radius:4px;border:1px solid var(--card-border)}.acct-link:hover{border-color:var(--accent);color:var(--text)}.acct-link.acct-active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}</style>
</head>
<body>
<div class="layout"><div class="sidebar"><div class="sidebar-header">MT5 Monitor</div><nav class="sidebar-nav"><a href="/" class="nav-item {{ACTIVE_DASHBOARD}}">&#x1F4CA 总监控台</a><a href="/single" class="nav-item {{ACTIVE_SINGLE}}">&#x1F4C8 单账户监控</a></nav></div><div class="main-content"><div class="container">
<div class="header">
<h1>Gin MT5实时监控台</h1>
<div class="time">{{TIMESTAMP}}</div>
{{SELECTOR}}</div>
<div class="summary-bar">
<div class="summary-item"><div class="label">总余额</div><div class="value neutral">{{TB}}</div></div>
<div class="summary-item"><div class="label">总净值</div><div class="value neutral">{{TE}}</div></div>
<div class="summary-item"><div class="label">浮动盈亏</div><div class="value {{TPCLS}}">{{TP}}</div></div>
<div class="summary-item"><div class="label">持仓数</div><div class="value neutral">{{TPP}}</div></div>
<div class="summary-item"><div class="label">实盘在线</div><div class="value neutral">{{OL}}/{{TL}}</div></div>
</div>
{{CHART}}
<div class="cards" id="cardsContainer">
{{CARDS}}
</div>
<div class="footer"><span>{{TIMESTAMP}}</span><span>MT5 Multi-Account Monitor by Gin</span></div>
</div>
</body>
</html>
